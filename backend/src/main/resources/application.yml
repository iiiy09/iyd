server:
  port: ${PORT:8080}

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:/tmp/data/iyd_learning;MODE=MySQL;FILE_LOCK=FS
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
  redis:
    host: ${REDIS_HOST:}
    port: ${REDIS_PORT:6379}
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: iydLearningSystemSecretKey2024StudentAI
  expiration: 604800000

aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    accessKeyId: demo-key
    accessKeySecret: demo-secret
    bucketName: iyd-learning

deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-0c025f7cb9c346f7b1ec0e10ab53bff9}
  api-url: https://api.deepseek.com/v1/chat/completions
  model: deepseek-chat
