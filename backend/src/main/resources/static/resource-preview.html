fetch('/api/resource/' + id)

  .then(res => {
    if (res.code === 200 && res.data) {
      const d = res.data;
      document.title = d.resourceName + ' - iyd\u5b66\u4e60';
      document.getElementById('title').textContent = d.resourceName;
      const tags = document.getElementById('tags');
      if (d.stage) tags.innerHTML += '<span class="tag">' + d.stage + '</span>';
      if (d.subject) tags.innerHTML += '<span class="tag">' + d.subject + '</span>';
      if (d.resourceType) tags.innerHTML += '<span class="tag">' + d.resourceType + '</span>';
      tags.innerHTML += '<span class="tag">\u4e0b\u8f7d ' + d.downloadCount + ' \u6b21</span>';

      const key = (d.subject || '') + '_' + (d.resourceType || '');
      const content = contentDB[key];

      if (content) {
        document.getElementById('contentBody').innerHTML = content;
      } else {
        document.getElementById('contentBody').innerHTML = '<h3>\u8d44\u6599\u5185\u5bb9</h3><p>\u300a' + d.resourceName + '\u300b\u662f\u4e00\u4efd\u4f18\u8d28\u7684' + (d.subject || '') + (d.resourceType || '') + '\u8d44\u6599\u3002</p><p>\u8bf7\u8054\u7cfb\u7ba1\u7406\u5458\u4e0a\u4f20\u5b8c\u6574\u6587\u4ef6\u3002</p>';
      }
    } else {
      document.getElementById('contentBody').innerHTML = '<div class="error">\u8d44\u6599\u52a0\u8f7d\u5931\u8d25</div>';
    }
  })
  .catch(() => {
    document.getElementById('contentBody').innerHTML = '<div class="error">\u7f51\u7edc\u8bf7\u6c42\u5931\u8d25</div>';
  });
